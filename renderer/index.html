<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'" />
  <title>LAN Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Titlebar -->
  <header class="titlebar">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      LAN Share
    </div>
    <div class="device-badge">
      <span class="status-dot"></span>
      <span id="myDeviceName">Initializing…</span>
    </div>
  </header>

  <!-- Layout -->
  <main class="layout">

    <!-- Gòch: lis aparèy -->
    <section class="panel panel-devices">
      <div class="panel-header">
        <h2>Nearby Devices</h2>
        <span class="device-count" id="deviceCount">0</span>
      </div>
      <div class="scan-line"></div>
      <div class="device-list" id="deviceList">
        <div class="empty-state" id="emptyState">
          <div class="radar">
            <div class="radar-ring r1"></div>
            <div class="radar-ring r2"></div>
            <div class="radar-ring r3"></div>
            <div class="radar-dot"></div>
          </div>
          <p>Scanning for devices…</p>
          <small>Lòt aparèy sou menm WiFi a ap parèt isi otomatikman.</small>
        </div>
      </div>
    </section>

    <!-- Dwat: panel voye -->
    <section class="panel panel-send">

      <div class="no-device-selected" id="noDeviceSelected">
        <svg viewBox="0 0 24 24" fill="none" width="52" height="52" opacity=".25">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>Klike sou yon aparèy pou kòmanse voye fichye.</p>
      </div>

      <div class="send-ui" id="sendUI" style="display:none">

        <!-- Aparèy sible -->
        <div class="target-device">
          <div class="target-avatar" id="targetAvatar"></div>
          <div class="target-info">
            <h3 id="targetName">—</h3>
            <span id="targetAddress" class="mono small muted">—</span>
          </div>
          <button class="btn btn-ghost btn-sm" id="btnDeselect">✕</button>
        </div>

        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" multiple style="display:none" />
          <div class="drop-zone-inner">
            <svg viewBox="0 0 24 24" fill="none" width="36" height="36" opacity=".5">
              <path d="M12 15V3m0 12l-4-4m4 4l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p>Depose fichye isi</p>
            <small>oswa</small>
            <button class="btn btn-outline" id="btnPickFiles">Chwazi Fichye</button>
          </div>
        </div>

        <!-- Lis fichye chwazi -->
        <div class="file-list" id="fileList" style="display:none">
          <div class="file-list-header">
            <span id="fileCountLabel">0 fichye</span>
            <button class="btn btn-ghost btn-xs" id="btnClearFiles">Efase</button>
          </div>
          <div id="fileItems"></div>
        </div>

        <!-- Bouton aksyon -->
        <div class="action-row">
          <button class="btn btn-primary" id="btnSend" disabled>
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Voye
          </button>
          <button class="btn btn-danger" id="btnCancel" style="display:none">Anile</button>
        </div>

        <!-- Pwogresyon -->
        <div class="transfer-progress" id="transferProgress" style="display:none">
          <div class="progress-header">
            <span id="progressLabel">Ap prepare…</span>
            <span id="progressPct" class="mono">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-meta">
            <span id="progressBytes" class="mono"></span>
            <span id="progressFile" class="mono muted"></span>
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- Modal: Demann koneksyon antran (resevwa) -->
  <div class="overlay" id="overlayIncoming" style="display:none">
    <div class="modal">
      <div class="modal-icon modal-icon--request">
        <svg viewBox="0 0 24 24" fill="none" width="28" height="28">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h3 id="requestTitle">Demann Koneksyon</h3>
      <p><strong id="requestPeerName">—</strong> vle voye:</p>
      <div class="file-summary" id="fileSummary"></div>
      <p class="mono small muted" id="requestPeerAddress"></p>
      <div class="modal-actions">
        <button class="btn btn-danger"  id="btnReject">Rejte</button>
        <button class="btn btn-primary" id="btnAccept">Aksepte</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-stack" id="toastStack"></div>

  <script src="app.js"></script>
</body>
</html>
